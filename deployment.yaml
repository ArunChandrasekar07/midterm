apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-demo1
  template:
    metadata:
      labels:
        app: html-demo1
    spec:
      containers:
      - name: html-demo1
        image: arundocker2005/html-demo1:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: html-service1
spec:
  type: NodePort
  selector:
    app: html-demo1
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30008